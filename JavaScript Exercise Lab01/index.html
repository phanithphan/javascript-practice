<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Web API Lab</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-100 min-h-screen py-10 px-4 font-sans">
    <div class="max-w-4xl mx-auto bg-white rounded-2xl shadow-lg border border-slate-200 overflow-hidden">
        <div class="bg-slate-900 text-white px-6 py-5">
            <h1 class="text-2xl font-bold">Web API lab</h1>
            <p class="text-slate-300 text-sm mt-1">Practice Web APIs</p>
        </div>

        <div class="p-6 space-y-8">
            
            <section>
                <h2 class="text-lg font-semibold mb-3">1. Form Validation</h2>
                <input id="numInput" type="number" min="100" max="300" required class="border px-3 py-2 rounded">
                <button onclick="checkNumber()" class="bg-blue-600 text-white px-4 py-2 rounded">Check</button>
                <p id="formResult"></p>
            </section>

            <section>
                <h2 class="text-lg font-semibold mb-3">2. Storage API</h2>
                <button onclick="saveData()" class="bg-green-600 text-white px-4 py-2 rounded">Save</button>
                <button onclick="loadData()" class="bg-indigo-600 text-white px-4 py-2 rounded">Load</button>
                <p id="storageResult"></p>
            </section>

            <section>
                <h2 class="text-lg font-semibold mb-3">3. Geolocation</h2>
                <button onclick="getLocation()" class="bg-purple-600 text-white px-4 py-2 rounded">Get Location</button>
                <p id="geoResult"></p>
            </section>

            <section>
                <h2 class="text-lg font-semibold mb-3">4. Fetch API</h2>
                <button onclick="getUser()" class="bg-orange-600 text-white px-4 py-2 rounded">Fetch Data</button>
                <pre id="apiResult"></pre>
            </section>

        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
