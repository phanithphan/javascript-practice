<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Day 01</title>
    <script src="https:cdn.tailwindcss.com"></script>
</head>

<body class="bg-white min-h-screen flex items-center justify-center">

    <div class="bg-white border border-gray-300 p-8 rounded-2xl max-w-xl w-full">
        <h1 class="text-2xl font-bold text-center text-gray-800">
            To see the results, open the console (F12)
        </h1>
    </div>

    <script>

        /*
        * 1. CREATE ARRAY
        */
       console.log("\n--- 1. CREATE ARRAY ---");

       let fruits = ["Apple", "Banana", "Mango"];

       console.log("Fruits:", fruits);

       /*
       * 2. ACCESS ELEMENTS
       */
      console.log("\n--- 2. ACCESS ELEMENTS ---");

      console.log("First fruit:", fruits[0]);
      console.log("Second fruit:", fruits[1]);
      console.log("Last fruit:", fruits[fruits.length - 1]);

      /*
      * 3. MODIFY ARRAY
      */
     console.log("\n--- 3. MODIFY ARRAY ---");

     fruits[1] = "Orange";
     console.log("After modification:", fruits);

     /*
     * 4. ARRAY LENGTH  
     */
    console.log("\n--- ARRAY LENGTH ---");

    console.log("Length of array:", fruits.length)

    /*
    * 5. ADD ELEMENTS
    */
   console.log("\n--- 5. ADD ELEMENTS ---");

   fruits.push("Pineaple"); // add at end
   console.log("After push:", fruits);

   fruits.unshift("Grape"); // add at beginning
   console.log("After unshift:", fruits);

   /*
   * 6. REMOVE ELEMENTS
   */
  console.log("\n--- 6. REMOVE ELEMENTS ---");

  fruits.pop(); // remove last
  console.log("After pop:", fruits);

  fruits.shift(); // remove first
  console.log("After shift:", fruits);

  /*
  * 7. LOOP THROUGH ARRAY
  */
 console.log("\n--- 7. LOOP THROUGH ARRAY ---");

 for (let fruit of fruits) {
    console.log("Fruit:", fruit);
 }

 /*
 * 8. ARRAY + INDEX LOOP
 */
console.log("\n--- 8. LOOP WITH INDEX ---");

for (let i = 0; i < fruits.length; i++) {
    console.log("Index", i, "=" , fruits[i]);
}

/*
* 9. ARRAY TYPE CHECK
*/
console.log("\n--- 9. ARRAY TYPE ---");

console.log("typeof fruits =", typeof fruits); // object
console.log("Is array?", fruits instanceof Array);

/*
* 10. SPREAD OPERATOR
*/
console.log("\n--- 10. SPREAD OPERATOR ---");

let numbers = [1, 2, 3];
let copyNumbwers = [...numbers];

console.log("Original:", numbers);
console.log("Copied:", copyNumbwers);

// Combine arrays
let combined = [...numbers, 4, 5];
console.log("Combined:", combined);

/*
* 11. ARRAY METHODS
*/
console.log("\n--- 11. ARRAY METHODS ---");

let nums = [5, 2, 9, 1];

console.log("Original nums:", nums);

// sort
nums.sort();
console.log("Sorted:", nums);

// reverse
nums.reverse();
console.log("Reverse:", nums);
    </script>

</body>

</html>
